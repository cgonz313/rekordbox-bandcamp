<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rekordbox-bandcamp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wrap {
      text-align: center;
      padding: 40px 24px;
      max-width: 480px;
      width: 100%;
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .logo-row img { height: 80px; width: auto; }

    .logo-sep {
      font-size: 28px;
      font-weight: 300;
      color: #2a2a2a;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #e0e0e0;
    }

    .sub {
      font-size: 13px;
      color: #c8c8c8;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    .step {
      background: #181818;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 28px 32px;
      margin-bottom: 16px;
    }

    .step-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #c8c8c8;
      margin-bottom: 10px;
    }

    .file-name {
      display: inline-block;
      font-size: 17px;
      font-weight: 600;
      color: #00c8a0;
      background: rgba(0,200,160,0.08);
      border: 1px solid rgba(0,200,160,0.2);
      border-radius: 8px;
      padding: 8px 18px;
      margin-bottom: 10px;
    }

    .step-hint {
      font-size: 12px;
      color: #c8c8c8;
      line-height: 1.5;
    }

    .checking {
      font-size: 13px;
      color: #c8c8c8;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .btn {
      display: inline-block;
      background: #00c8a0;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 8px;
    }

    .btn:hover { opacity: 0.85; }

    #state-checking { display: block; }
    #state-stopped  { display: none; }
    #state-running  { display: none; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="logo-row">
    <img src="static/images/bc-logo-512.png" alt="Bandcamp">
    <span class="logo-sep">→</span>
    <img src="static/images/rb-logo.png" alt="rekordbox">
  </div>

  <!-- Checking -->
  <div id="state-checking">
    <p class="checking">Checking if the app is running…</p>
  </div>

  <!-- Server not running -->
  <div id="state-stopped">
    <div class="step">
      <div class="step-label">To get started</div>
      <div class="file-name">Launch.command</div>
      <div class="step-hint">Double-click the file above in Finder.<br>First launch installs everything automatically.</div>
    </div>
    <p class="sub" style="margin-bottom:0;font-size:12px">Once the app is running, this page will take you there automatically.</p>
  </div>

  <!-- Server running -->
  <div id="state-running">
    <h1>App is running</h1>
    <p class="sub">Taking you there now…</p>
    <a class="btn" href="http://localhost:8000">Open App →</a>
  </div>

</div>

<script>
  async function check() {
    try {
      const res = await fetch('http://localhost:8000', { signal: AbortSignal.timeout(1500) });
      if (res.ok) {
        document.getElementById('state-checking').style.display = 'none';
        document.getElementById('state-running').style.display = 'block';
        setTimeout(() => { window.location.href = 'http://localhost:8000'; }, 1200);
        return true;
      }
    } catch {}
    return false;
  }

  async function init() {
    const running = await check();
    if (!running) {
      document.getElementById('state-checking').style.display = 'none';
      document.getElementById('state-stopped').style.display = 'block';
      // Keep polling — if they launch the server, redirect automatically
      setInterval(async () => {
        if (await check()) clearInterval();
      }, 2000);
    }
  }

  init();
</script>
</body>
</html>
